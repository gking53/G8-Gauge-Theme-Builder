<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>G8 Gauge Theme Builder</title>
<!-- Russo One = the cluster's font, vendored from the app (docs/vendor/fonts).
     The default cluster font is Roboto (Android system); offline we fall back to
     the platform sans-serif, which is visually equivalent for the readouts. -->
<style>
  @font-face {
    font-family: 'Russo One';
    src: url('./vendor/fonts/russo_one.ttf') format('truetype');
    font-weight: 400; font-display: swap;
  }
</style>
<!--
  Import map for single-package deps (jszip, node-forge, lottie). The ya-webadb
  stack is NOT here — it's bundled into docs/vendor/yawebadb.js (npm run bundle-adb)
  so all @yume-chan packages share one stream-extra instance; loading them as
  separate CDN modules caused a realm mismatch that broke USB transferOut.
  To go fully offline, vendor jszip/forge/lottie into docs/vendor/ and repoint these.
-->
<script type="importmap">
{
  "imports": {
    "jszip": "./vendor/jszip.js",
    "node-forge": "./vendor/node-forge.js",
    "lottie-web": "./vendor/lottie-web.js"
  }
}
</script>
<style>
  :root { color-scheme: dark; --bg:#0a1633; --fg:#e8e8e8; --accent:#0066cc; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:24px 20px 8px; }
  h1 { margin:0 0 4px; font-size:22px; }
  p.sub { margin:0; opacity:.7; font-size:13px; }
  main { max-width:760px; margin:0 auto; padding:16px 20px 60px; }
  .controls { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0; }
  .ctl { background:#0e1d3f; border:1px solid #1b2e5a; border-radius:10px; padding:12px 14px; }
  .ctl label { display:block; font-weight:600; margin-bottom:8px; }
  .ctl .row { display:flex; align-items:center; gap:10px; }
  input[type=color] { width:46px; height:34px; border:none; background:none; padding:0; cursor:pointer; }
  input[type=text] { width:96px; background:#08122b; color:var(--fg); border:1px solid #24386a;
    border-radius:6px; padding:6px 8px; font-family:ui-monospace,monospace; }
  .ctl small { opacity:.6; display:block; margin-top:6px; font-size:12px; }
  .ctl .fade-row { gap:8px; margin-top:8px; font-size:12px; opacity:.85; }
  .ctl .fade-row input[type=range] { flex:1; accent-color:var(--accent); }
  .ctl .bar-mode { width:100%; background:#08122b; color:var(--fg);
    border:1px solid #24386a; border-radius:6px; padding:7px 8px; font-size:14px; }
  .ctl .bar-two .row { margin-top:8px; }
  .ctl .bar-lbl { font-size:12px; opacity:.7; }
  .file-ctl { grid-column:1/-1; }
  img.preview { height:40px; image-rendering:auto; background:#fff2; border-radius:4px; padding:2px; }
  .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
  button { background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:11px 18px; font-size:15px; font-weight:600; cursor:pointer; }
  button.secondary { background:#1b2e5a; }
  button:disabled { opacity:.5; cursor:default; }
  .opt { display:flex; align-items:center; gap:8px; margin:14px 0; font-size:13px; opacity:.85; }
  #log { background:#060e22; border:1px solid #1b2e5a; border-radius:8px; padding:12px;
    font-family:ui-monospace,monospace; font-size:12.5px; white-space:pre-wrap; margin-top:16px;
    max-height:240px; overflow:auto; }
  a.dl { display:inline-block; margin:4px 8px 0 0; color:#8ab4ff; font-size:13px; }
  .warn { color:#ffcf6b; }
  /* theme base selector */
  .baserow { display:flex; align-items:center; gap:10px; margin:6px 0 14px; }
  .baserow label { font-weight:600; }
  .baserow select { background:#0e1d3f; color:var(--fg); border:1px solid #24386a;
    border-radius:8px; padding:8px 10px; font-size:15px; }
  .baserow-hint { font-size:12px; opacity:.6; }
  /* preview — positions mirror fragment_cluster.xml guidelines (1280x800) */
  #preview { margin:18px 0; }
  .pv-stage { position:relative; width:100%; aspect-ratio:16/10; border-radius:12px;
    overflow:hidden; border:1px solid #1b2e5a; background:#000;
    font-family:'Roboto', system-ui, 'Segoe UI', Arial, sans-serif; color:#e8eefc; container-type:size; }
  /* Russo One is used ONLY for the speed value and gauge markers (per the app
     styles); everything else (odometer, coolant) uses the default Roboto. */
  .pv-speed, .pv-mk { font-family:'Russo One', sans-serif; }
  .pv-bg { position:absolute; inset:0; }
  .pv-bgimg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; }  /* fitCenter on device; width/height needed so the img box = stage (inset:0 won't stretch a replaced element) */
  /* screen bands: status bar (top), cluster fragment (middle), nav bar (bottom) */
  .pv-statusbar { position:absolute; top:0; left:0; right:0; z-index:3; display:flex;
    align-items:center; justify-content:space-between; padding:0 3%;
    font-size:2.4cqw; color:#cfd6e6; background:linear-gradient(#000a, transparent); }
  .pv-fragment { position:absolute; left:0; right:0; }
  /* gauges */
  .pv-gauge { position:absolute; }
  .pv-lottie { position:absolute; inset:0; filter:drop-shadow(0 2px 8px #0008); }
  .pv-lottie svg { width:100% !important; height:100% !important; }
  .pv-center { left:19%; right:19%; top:2%; height:60%; }
  .pv-left  { left:2%;  width:17%; top:20%; height:48%; }
  .pv-right { left:81%; width:17%; top:20%; height:48%; }
  /* center: big SPEED readout (positioned to the center_data_field box) */
  .pv-speed { position:absolute; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none; line-height:1; }
  .pv-speed b { font-size:13cqw; font-weight:700; }
  .pv-speed span { font-size:3cqw; letter-spacing:.2em; opacity:.7; margin-top:.3em; }
  /* side gauge icon (white), markers, value */
  .pv-gicon { position:absolute; left:50%; top:12%; transform:translateX(-50%);
    width:30%; height:16%; }
  .pv-gicon svg { width:100%; height:100%; }
  .pv-mk { position:absolute; left:50%; transform:translateX(-50%);
    font-size:3cqw; font-weight:600; opacity:.85; }
  .pv-mk-top { top:0; } .pv-mk-bot { bottom:0; }
  /* coolant temp number (top-level, upper-left of the left gauge) */
  .pv-coolant { position:absolute; font-size:3.4cqw; font-weight:600; white-space:nowrap; }
  /* vendor logo: centered, bottom edge ~70% height (just above odometer) */
  .pv-logo { position:absolute; left:50%; bottom:33%; transform:translateX(-50%);
    width:18%; height:auto; z-index:2; }
  .pv-logo svg { width:100%; height:100%; }
  /* odometer divider: thin glowing line in primary color at ~70% height */
  .pv-odo { position:absolute; left:8%; right:8%; top:70%; height:3px; z-index:2; }
  /* odometer row: 3 equal cells (odometer | DTC | engine hours), each centered */
  .pv-readouts { position:absolute; display:grid; grid-template-columns:1fr 1fr 1fr;
    align-items:baseline; }
  .pv-of { display:flex; align-items:baseline; justify-content:center; gap:.35em; }
  .pv-of-t { font-size:3.75cqh; opacity:.85; }   /* odometer_title 20dp @240dpi */
  .pv-of-v { font-size:4.5cqh; }                 /* odometer_value 24dp */
  .pv-of-u { font-size:4.5cqh; opacity:.85; }    /* odometer_unit 24dp */
  /* metrics bar (datafields) — row of fields near the bottom of the fragment */
  .pv-datafields { position:absolute; display:flex; align-items:center;
    justify-content:space-around; }
  .pv-field { display:flex; flex-direction:column; align-items:center; line-height:1.25; }
  .pv-field-t { font-size:1.8cqw; opacity:.55; letter-spacing:.06em; }
  .pv-field-v { font-size:3cqw; font-weight:600; }
  /* SystemUI nav bar — the black strip at the bottom of the screen */
  .pv-navbar { position:absolute; left:0; right:0; bottom:0; height:13%;
    display:flex; align-items:center; justify-content:space-between; padding:0 3%;
    background:#000; border-top:1px solid #1b2e5a; }
  .pv-nav-left, .pv-nav-right { display:flex; align-items:center; gap:2.5cqw; height:100%; }
  .pv-nav-btn { height:60%; aspect-ratio:1.2; background:none; border:none; padding:0;
    display:flex; align-items:center; justify-content:center; }
  .pv-nav-btn svg { width:100%; height:100%; }
  .pv-nav-logo { aspect-ratio:2.2; }
  .pv-nav-right .pv-nav-btn { height:82%; }  /* IQS slightly bigger */
  .pv-hint { font-size:12px; opacity:.6; margin:4px 2px 0; }
</style>
</head>
<body>
<header>
  <h1>G8 Gauge Theme Builder</h1>
</header>
<main>
  <div class="baserow">
    <label for="base">Theme base</label>
    <select id="base"></select>
    <span class="baserow-hint">full swap — all overlays use the selected base</span>
  </div>
  <div id="preview"></div>
  <p class="pv-hint">Live mockup — numbers (RPM/temp/fuel/odo/clock) are placeholders; layout approximates the device.</p>

  <div id="controls" class="controls"></div>

  <div class="actions">
    <button id="build">Build overlays</button>
    <button id="install" class="secondary" disabled>Install via USB &amp; reboot</button>
  </div>
  <div id="downloads"></div>
  <div id="log"></div>
</main>

<script type="module" src="./app.js"></script>
</body>
</html>
